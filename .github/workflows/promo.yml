name: Promo Landing

on:
  push:
    branches:
      - main
    paths:
      - "landing/**"
      - "docker-compose.yml"
      - "deploy/Caddyfile"
      - "scripts/project.sh"
      - ".github/workflows/promo.yml"
  workflow_dispatch:

concurrency:
  group: production
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: spectr6161-dev
  LANDING_IMAGE_SHA: ghcr.io/spectr6161-dev/offergo-landing:${{ github.sha }}
  LANDING_IMAGE_LATEST: ghcr.io/spectr6161-dev/offergo-landing:latest

jobs:
  build:
    name: Build and push landing
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: landing/package-lock.json

      - name: Install landing dependencies
        working-directory: landing
        run: npm ci

      - name: Build landing
        working-directory: landing
        run: npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push landing image
        uses: docker/build-push-action@v6
        with:
          context: ./landing
          file: ./landing/Dockerfile
          push: true
          tags: |
            ${{ env.LANDING_IMAGE_SHA }}
            ${{ env.LANDING_IMAGE_LATEST }}
          cache-from: type=gha,scope=offergo-landing
          cache-to: type=gha,mode=max,scope=offergo-landing

  deploy:
    name: Deploy landing
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10

    steps:
      - name: Checkout deployment files
        uses: actions/checkout@v4

      - name: Prepare SSH
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.PROD_SSH_PRIVATE_KEY }}" > ~/.ssh/offergo_deploy_key
          chmod 600 ~/.ssh/offergo_deploy_key
          ssh-keyscan -H "${{ secrets.PROD_SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload landing deployment bundle
        run: |
          set -euo pipefail
          tar -czf /tmp/offergo-landing-deploy-bundle.tgz docker-compose.yml deploy/Caddyfile scripts/project.sh
          scp -i ~/.ssh/offergo_deploy_key /tmp/offergo-landing-deploy-bundle.tgz \
            "${{ secrets.PROD_SSH_USER }}@${{ secrets.PROD_SSH_HOST }}:/tmp/offergo-landing-deploy-bundle-${{ github.sha }}.tgz"

      - name: Deploy landing over SSH
        run: |
          set -euo pipefail
          GHCR_TOKEN_B64="$(printf '%s' "${{ secrets.GITHUB_TOKEN }}" | base64 -w 0)"
          ssh -i ~/.ssh/offergo_deploy_key \
            "${{ secrets.PROD_SSH_USER }}@${{ secrets.PROD_SSH_HOST }}" \
            "GHCR_USER='${{ github.actor }}' GHCR_TOKEN_B64='${GHCR_TOKEN_B64}' LANDING_IMAGE='${{ env.LANDING_IMAGE_SHA }}' BUNDLE_PATH='/tmp/offergo-landing-deploy-bundle-${{ github.sha }}.tgz' bash -s" <<'REMOTE'
          set -euo pipefail

          mkdir -p "$HOME/offergo"
          tar -xzf "$BUNDLE_PATH" -C "$HOME/offergo"
          chmod +x "$HOME/offergo/scripts/project.sh"

          cd "$HOME/offergo"

          GHCR_TOKEN="$(printf '%s' "$GHCR_TOKEN_B64" | base64 -d)"
          printf '%s' "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

          export LANDING_IMAGE
          sh scripts/project.sh deploy-landing-image
          docker image prune -f --filter "until=168h" || true
          REMOTE

      - name: Verify promo endpoint
        run: |
          set -euo pipefail
          curl --fail --show-error --location --max-time 30 https://offergo.ru/promo > /tmp/offergo-promo.html
          grep -q "offerGO" /tmp/offergo-promo.html
