services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: offergo-postgres
    environment:
      POSTGRES_DB: offergo_app
      POSTGRES_USER: offergo
      POSTGRES_PASSWORD: offergo
    ports:
      - "5434:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: offergo-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  minio:
    image: minio/minio:latest
    container_name: offergo-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  mailpit:
    image: axllent/mailpit:latest
    container_name: offergo-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
      - minio
      - mailpit
    ports:
      - "3000:3000"

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
      - minio

volumes:
  postgres-data:
  redis-data:
  minio-data:
