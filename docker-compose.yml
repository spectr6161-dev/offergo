x-app-build: &app-build
  context: .
  dockerfile: Dockerfile

x-app-environment: &app-environment
  APP_ENV: ${APP_ENV:-development}
  DATABASE_URL: postgresql://${POSTGRES_USER:-offergo}:${POSTGRES_PASSWORD:-offergo}@postgres:5432/${POSTGRES_DB:-offergo_app}?schema=public
  REDIS_URL: redis://redis:6379
  S3_ENDPOINT: http://minio:9000

x-app-depends-on: &app-depends-on
  postgres:
    condition: service_healthy
  redis:
    condition: service_healthy
  minio:
    condition: service_healthy

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: offergo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-offergo_app}
      POSTGRES_USER: ${POSTGRES_USER:-offergo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-offergo}
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-5434}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: offergo-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: offergo-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "127.0.0.1:${MINIO_HOST_PORT:-9000}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_HOST_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    image: ${API_IMAGE:-saas-base-api:local}
    build:
      <<: *app-build
      target: api
    init: true
    restart: unless-stopped
    env_file:
      - .env
    environment:
      <<: *app-environment
      NODE_ENV: ${NODE_ENV:-development}
    depends_on: *app-depends-on
    ports:
      - "${API_BIND_HOST:-0.0.0.0}:${API_PORT:-3001}:3001"
    volumes:
      - server-logs:/app/logs
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001/api/v1/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  web:
    image: ${WEB_IMAGE:-saas-base-web:local}
    build:
      <<: *app-build
      target: web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
        NEXT_PUBLIC_BETTER_AUTH_URL: ${NEXT_PUBLIC_BETTER_AUTH_URL:-http://localhost:3001}
        NEXT_PUBLIC_TELEGRAM_BOT_USERNAME: ${NEXT_PUBLIC_TELEGRAM_BOT_USERNAME:-}
    init: true
    restart: unless-stopped
    env_file:
      - .env
    environment:
      <<: *app-environment
      NODE_ENV: production
      API_URL: http://api:3001
    depends_on:
      api:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "${WEB_BIND_HOST:-0.0.0.0}:${PORT:-3000}:3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/register').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  reverse-proxy:
    image: caddy:2-alpine
    container_name: offergo-caddy
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-offergo.ru}
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

  worker:
    image: ${WORKER_IMAGE:-saas-base-worker:local}
    build:
      <<: *app-build
      target: worker
    init: true
    restart: unless-stopped
    env_file:
      - .env
    environment:
      <<: *app-environment
      NODE_ENV: ${NODE_ENV:-development}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - server-logs:/app/logs

  db-sync:
    image: ${API_IMAGE:-saas-base-api:local}
    build:
      <<: *app-build
      target: api
    profiles: ["tools"]
    env_file:
      - .env
    environment:
      <<: *app-environment
      NODE_ENV: ${NODE_ENV:-development}
    depends_on:
      postgres:
        condition: service_healthy
    command: pnpm --filter @offergo/db exec prisma db push --skip-generate

  db-seed:
    image: ${API_IMAGE:-saas-base-api:local}
    build:
      <<: *app-build
      target: api
    profiles: ["tools"]
    env_file:
      - .env
    environment:
      <<: *app-environment
      NODE_ENV: ${NODE_ENV:-development}
    depends_on:
      postgres:
        condition: service_healthy
    command: pnpm --filter @offergo/db db:seed

volumes:
  postgres-data:
  redis-data:
  minio-data:
  server-logs:
  caddy-data:
  caddy-config:
